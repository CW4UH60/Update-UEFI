name: WinPE CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  unit-tests:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install Pester
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module Pester -Force -SkipPublisherCheck -Scope CurrentUser
      - name: Run unit tests
        shell: pwsh
        run: |
          Invoke-Pester -Path ./tests -Output Detailed -CI

  build-winpe-iso:
    runs-on: windows-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v5
      - name: Install ADK Deployment Tools + WinPE Addon
        shell: powershell
        run: |
          choco install windows-adk --package-parameters "/Features OptionId.DeploymentTools" -y --no-progress
          choco install windows-adk-winpe -y --no-progress
      - name: Build bootable WinPE ISO
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $candidateAdkRoots = @(
            (Join-Path ${env:ProgramFiles(x86)} 'Windows Kits\10\Assessment and Deployment Kit'),
            (Join-Path $env:ProgramFiles 'Windows Kits\10\Assessment and Deployment Kit')
          ) | Get-Unique

          $adkRoot = $candidateAdkRoots | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $adkRoot) {
            throw "ADK root not found. Checked: $($candidateAdkRoots -join '; ')"
          }

          $winPeRoot = Join-Path $adkRoot 'Windows Preinstallation Environment'
          $copype = Join-Path $winPeRoot 'copype.cmd'
          $makeWinPeMedia = Join-Path $winPeRoot 'MakeWinPEMedia.cmd'

          if (-not (Test-Path $copype)) {
            throw "copype.cmd not found at expected path: $copype"
          }

          if (-not (Test-Path $makeWinPeMedia)) {
            throw "MakeWinPEMedia.cmd not found at expected path: $makeWinPeMedia"
          }

          $preferredArches = @('amd64', 'x64', 'arm64', 'x86')
          $resolvedArch = $null
          foreach ($arch in $preferredArches) {
            if (Test-Path (Join-Path $winPeRoot $arch)) {
              $resolvedArch = $arch
              break
            }
          }

          if (-not $resolvedArch) {
            $available = @(Get-ChildItem -Path $winPeRoot -Directory -ErrorAction SilentlyContinue | Select-Object -ExpandProperty Name)
            throw "No WinPE architecture folder found under '$winPeRoot'. Found: $($available -join ', ')"
          }

          # copype expects amd64 token even when some installations label folder x64
          $copypeArch = if ($resolvedArch -eq 'x64') { 'amd64' } else { $resolvedArch }

          if (Test-Path 'C:\WinPE_UEFI') {
            Remove-Item -Path 'C:\WinPE_UEFI' -Recurse -Force
          }

          & $copype $copypeArch C:\WinPE_UEFI
          if ($LASTEXITCODE -ne 0) { throw "copype failed with exit code $LASTEXITCODE (arch=$copypeArch, root=$winPeRoot)" }

          $mountPath = 'C:\WinPE_UEFI\mount'
          $imagePath = 'C:\WinPE_UEFI\media\sources\boot.wim'
          $ocRoot = Join-Path $winPeRoot "$resolvedArch\WinPE_OCs"

          & Dism /Mount-Image /ImageFile:$imagePath /index:1 /MountDir:$mountPath
          if ($LASTEXITCODE -ne 0) { throw "DISM mount failed with exit code $LASTEXITCODE" }

          $packages = @('WinPE-WMI.cab', 'WinPE-NetFX.cab', 'WinPE-Scripting.cab', 'WinPE-PowerShell.cab')
          foreach ($package in $packages) {
            $packagePath = Join-Path $ocRoot $package
            if (-not (Test-Path $packagePath)) {
              throw "Required WinPE package not found: $packagePath"
            }

            & Dism /Add-Package /Image:$mountPath /PackagePath:$packagePath
            if ($LASTEXITCODE -ne 0) { throw "DISM add-package failed for $package with exit code $LASTEXITCODE" }
          }

          & Dism /Unmount-Image /MountDir:$mountPath /Commit
          if ($LASTEXITCODE -ne 0) { throw "DISM unmount failed with exit code $LASTEXITCODE" }

          Copy-Item -Path 'winpe\*' -Destination 'C:\WinPE_UEFI\media\' -Recurse -Force

          & $makeWinPeMedia /ISO C:\WinPE_UEFI C:\WinPE_UEFI\SecureBootRemediation.iso
          if ($LASTEXITCODE -ne 0) { throw "MakeWinPEMedia failed with exit code $LASTEXITCODE" }
      - name: Upload ISO artifact
        uses: actions/upload-artifact@v6
        with:
          name: SecureBootRemediation-iso
          path: C:\WinPE_UEFI\SecureBootRemediation.iso
