name: WinPE CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  unit-tests:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install Pester
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module Pester -Force -SkipPublisherCheck -Scope CurrentUser
      - name: Run unit tests
        shell: pwsh
        run: |
          Invoke-Pester -Path ./tests -Output Detailed -CI

  build-winpe-iso:
    runs-on: windows-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v5
      - name: Install ADK Deployment Tools + WinPE Addon
        shell: powershell
        run: |
          choco install windows-adk --package-parameters "/Features OptionId.DeploymentTools" -y --no-progress
          choco install windows-adk-winpe -y --no-progress
      - name: Build bootable WinPE ISO
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $candidateAdkRoots = @(
            (Join-Path ${env:ProgramFiles(x86)} 'Windows Kits\10\Assessment and Deployment Kit'),
            (Join-Path $env:ProgramFiles 'Windows Kits\10\Assessment and Deployment Kit')
          ) | Get-Unique

          $adkRoot = $candidateAdkRoots | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $adkRoot) {
            throw "ADK root not found. Checked: $($candidateAdkRoots -join '; ')"
          }

          $winPeRoot = Join-Path $adkRoot 'Windows Preinstallation Environment'
          $copype = Join-Path $winPeRoot 'copype.cmd'
          $makeWinPeMedia = Join-Path $winPeRoot 'MakeWinPEMedia.cmd'

          if (-not (Test-Path $copype)) { throw "copype.cmd not found at expected path: $copype" }
          if (-not (Test-Path $makeWinPeMedia)) { throw "MakeWinPEMedia.cmd not found at expected path: $makeWinPeMedia" }

          $env:WinPERoot = $winPeRoot

          $preferredArches = @('amd64', 'x64', 'arm64', 'x86')
          $availableArches = $preferredArches | Where-Object {
            Test-Path (Join-Path $winPeRoot (Join-Path $_ 'Media'))
          }
          $resolvedArch = $availableArches | Select-Object -First 1
          if (-not $resolvedArch) {
            $available = @(Get-ChildItem -Path $winPeRoot -Directory -ErrorAction SilentlyContinue | Select-Object -ExpandProperty Name)
            throw "No valid WinPE architecture Media folders found under '$winPeRoot'. Found dirs: $($available -join ', '). Ensure WinPE Add-on installed correctly."
          }

          $buildRoot = Join-Path $env:RUNNER_TEMP 'WinPE_UEFI'
          if (Test-Path $buildRoot) { Remove-Item -Path $buildRoot -Recurse -Force }

          $tryArches = @()
          if ($resolvedArch -eq 'x64') {
            $tryArches = @('amd64', 'x64')
          } else {
            $tryArches += $resolvedArch
            if ($resolvedArch -eq 'amd64') { $tryArches += 'x64' }
          }
          $tryArches += $availableArches | Where-Object { $_ -notin $tryArches }

          $copypeSucceeded = $false
          foreach ($archToken in $tryArches) {
            Write-Host "Trying copype architecture token: $archToken"
            & $copype $archToken $buildRoot
            if ($LASTEXITCODE -eq 0) {
              $copypeSucceeded = $true
              $copypeArch = $archToken
              break
            }

            Write-Warning "copype failed for arch token '$archToken' with exit code $LASTEXITCODE"
            if (Test-Path $buildRoot) { Remove-Item -Path $buildRoot -Recurse -Force }
          }

          if (-not $copypeSucceeded) {
            throw "copype failed for all architecture tokens: $($tryArches -join ', '). WinPE root: $winPeRoot"
          }

          $mountPath = Join-Path $buildRoot 'mount'
          $imagePath = Join-Path $buildRoot 'media\sources\boot.wim'
          $ocRoot = Join-Path $winPeRoot "$resolvedArch\WinPE_OCs"

          & Dism /Mount-Image /ImageFile:$imagePath /index:1 /MountDir:$mountPath
          if ($LASTEXITCODE -ne 0) { throw "DISM mount failed with exit code $LASTEXITCODE" }

          $packages = @('WinPE-WMI.cab', 'WinPE-NetFX.cab', 'WinPE-Scripting.cab', 'WinPE-PowerShell.cab')
          foreach ($package in $packages) {
            $packagePath = Join-Path $ocRoot $package
            if (-not (Test-Path $packagePath)) { throw "Required WinPE package not found: $packagePath" }

            & Dism /Add-Package /Image:$mountPath /PackagePath:$packagePath
            if ($LASTEXITCODE -ne 0) { throw "DISM add-package failed for $package with exit code $LASTEXITCODE" }
          }

          & Dism /Unmount-Image /MountDir:$mountPath /Commit
          if ($LASTEXITCODE -ne 0) { throw "DISM unmount failed with exit code $LASTEXITCODE" }

          Copy-Item -Path 'winpe\*' -Destination (Join-Path $buildRoot 'media\') -Recurse -Force

          $isoPath = Join-Path $buildRoot 'SecureBootRemediation.iso'
          & $makeWinPeMedia /ISO $buildRoot $isoPath
          if ($LASTEXITCODE -ne 0) { throw "MakeWinPEMedia failed with exit code $LASTEXITCODE" }
      - name: Upload ISO artifact
        uses: actions/upload-artifact@v6
        with:
          name: SecureBootRemediation-iso
          path: ${{ runner.temp }}\WinPE_UEFI\SecureBootRemediation.iso
