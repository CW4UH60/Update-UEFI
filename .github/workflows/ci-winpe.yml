name: WinPE CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  unit-tests:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install Pester
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module Pester -Force -SkipPublisherCheck -Scope CurrentUser
      - name: Run unit tests
        shell: pwsh
        run: |
          Invoke-Pester -Path ./tests -Output Detailed -CI

  build-winpe-iso:
    runs-on: windows-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v5
      - name: Install ADK Deployment Tools + WinPE Addon
        shell: powershell
        run: |
          choco install windows-adk --package-parameters "/Features OptionId.DeploymentTools" -y --no-progress
          choco install windows-adk-winpe -y --no-progress
      - name: Build bootable WinPE ISO
        shell: cmd
        run: |
          @echo on
          setlocal enableextensions

          set "ADKROOT=%ProgramFiles(x86)%\Windows Kits\10\Assessment and Deployment Kit"
          if not exist "%ADKROOT%\Deployment Tools\DandISetEnv.bat" set "ADKROOT=%ProgramFiles%\Windows Kits\10\Assessment and Deployment Kit"
          if not exist "%ADKROOT%\Deployment Tools\DandISetEnv.bat" (
            echo ADK deployment tools environment script not found.
            exit /b 1
          )

          call "%ADKROOT%\Deployment Tools\DandISetEnv.bat"
          if errorlevel 1 (
            echo Failed to initialize ADK deployment environment.
            exit /b 1
          )

          set "WINPEROOT=%ADKROOT%\Windows Preinstallation Environment"
          if not exist "%WINPEROOT%\copype.cmd" (
            echo copype.cmd not found in %WINPEROOT%.
            exit /b 1
          )
          if not exist "%WINPEROOT%\MakeWinPEMedia.cmd" (
            echo MakeWinPEMedia.cmd not found in %WINPEROOT%.
            exit /b 1
          )

          set "BUILDROOT=%RUNNER_TEMP%\WinPE_UEFI"
          if exist "%BUILDROOT%" rmdir /s /q "%BUILDROOT%"

          set "COPYPE_ARCH="
          call "%WINPEROOT%\copype.cmd" amd64 "%BUILDROOT%"
          if not errorlevel 1 set "COPYPE_ARCH=amd64"

          if "%COPYPE_ARCH%"=="" (
            call "%WINPEROOT%\copype.cmd" arm64 "%BUILDROOT%"
            if not errorlevel 1 set "COPYPE_ARCH=arm64"
          )

          if "%COPYPE_ARCH%"=="" (
            call "%WINPEROOT%\copype.cmd" x86 "%BUILDROOT%"
            if not errorlevel 1 set "COPYPE_ARCH=x86"
          )

          if "%COPYPE_ARCH%"=="" (
            echo copype failed for all supported architecture tokens.
            exit /b 1
          )

          set "MOUNTPATH=%BUILDROOT%\mount"
          set "IMAGEPATH=%BUILDROOT%\media\sources\boot.wim"
          set "OCROOT=%WINPEROOT%\%COPYPE_ARCH%\WinPE_OCs"

          if not exist "%OCROOT%\WinPE-WMI.cab" (
            echo Expected WinPE optional component path missing: %OCROOT%
            exit /b 1
          )

          Dism /Mount-Image /ImageFile:"%IMAGEPATH%" /index:1 /MountDir:"%MOUNTPATH%"
          if errorlevel 1 exit /b 1

          for %%P in (WinPE-WMI.cab WinPE-NetFX.cab WinPE-Scripting.cab WinPE-PowerShell.cab) do (
            Dism /Add-Package /Image:"%MOUNTPATH%" /PackagePath:"%OCROOT%\%%P"
            if errorlevel 1 exit /b 1
          )

          Dism /Unmount-Image /MountDir:"%MOUNTPATH%" /Commit
          if errorlevel 1 exit /b 1

          xcopy /E /I /Y winpe "%BUILDROOT%\media\"
          if errorlevel 1 exit /b 1

          call "%WINPEROOT%\MakeWinPEMedia.cmd" /ISO "%BUILDROOT%" "%BUILDROOT%\SecureBootRemediation.iso"
          if errorlevel 1 exit /b 1
      - name: Upload ISO artifact
        uses: actions/upload-artifact@v6
        with:
          name: SecureBootRemediation-iso
          path: ${{ runner.temp }}\WinPE_UEFI\SecureBootRemediation.iso
